<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DUCO Overview</title>

<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="topbar">
    <h1>🪙 DUCO Dashboard</h1>
    <button onclick="showTab('dashboard')">📊 Dashboard</button>
    <button onclick="showTab('chat')">💬 Chat</button>
    <button onclick="showTab('donate')">🎁 Donate</button>
</div>

<!-- LOGIN -->
<div id="login" class="center">
    <h2>Enter DUCO Username</h2>
    <input id="username" placeholder="Username">
    <button onclick="saveUser()">Start</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="tab">

    <div class="grid">
        <div class="card">💰 <div id="balance">-</div></div>
        <div class="card">📈 <div id="price">-</div></div>
        <div class="card">⚡ <div id="hashrate">-</div></div>
        <div class="card">⛏️ <div id="miners">-</div></div>
        <div class="card">🪙 Today <div id="today">-</div></div>
        <div class="card">📊 Avg <div id="avg">-</div></div>
    </div>

    <canvas id="chart"></canvas>
    <p id="updated"></p>
</div>

<!-- CHAT -->
<div id="chat" class="tab hidden">
    <h2>💬 Chat (local)</h2>

    <div id="chatBox"></div>

    <input id="chatInput" placeholder="Message...">
    <button onclick="sendChat()">Send</button>
</div>

<!-- DONATE -->
<div id="donate" class="tab hidden">
    <h2>🎁 Donate DUCO</h2>

    <div class="rgb-box">
        <h3 id="donateUser">Dein Name</h3>
        <p>Duino-Coin Donation</p>

        <button onclick="copyDonate()">📋 Copy Address</button>
    </div>

    <p class="small">
        Sende DUCO an deinen Username als Donation 💚
    </p>
</div>

<script src="script.js"></script>
</body>
</html>
