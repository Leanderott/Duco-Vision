<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DUCO Overview</title>

<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="center">
    <h1>🪙 DUCO Dashboard</h1>

    <input id="username" placeholder="DUCO Username">
    <button onclick="saveUser()">Start</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="tab hidden">

    <h1>📊 DUCO Overview</h1>

    <div class="grid">

        <div class="card">
            💰 Balance
            <h2 id="balance">-</h2>
        </div>

        <div class="card">
            📈 Price
            <h2 id="price">-</h2>
        </div>

        <div class="card">
            ⚡ Hashrate
            <h2 id="hashrate">-</h2>
        </div>

        <div class="card">
            ⛏️ Miners
            <h2 id="miners">-</h2>
        </div>

        <div class="card">
            🔄 Updated
            <h2 id="updated">-</h2>
        </div>

    </div>

    <div class="chartBox">
        <canvas id="chart"></canvas>
    </div>

</div>

<!-- CHAT TAB -->
<div id="chat" class="tab hidden">
    <h2>💬 Chat</h2>

    <div id="chatBox" class="chatBox"></div>

    <input id="chatInput" placeholder="Message...">
    <button onclick="sendChat()">Send</button>
</div>

<!-- DONATE TAB -->
<div id="donate" class="tab hidden">
    <h2>🎁 Donate DUCO</h2>

    <div class="donateBox">
        <h3 id="donateUser">-</h3>
        <p>Send DUCO to this username</p>

        <button onclick="copyDonate()">📋 Copy Username</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
