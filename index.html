<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duco-Overview Dashboard</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #050505;
            --card-bg: #0c0c0c;
            --accent-color: #ff6600;
            --text-color: #ffffff;
            --text-muted: #888888;
            --border-color: #1a1a1a;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 1000px;
        }

        /* Basis-Karte mit permanentem Orangen Leuchten */
        .card {
            background-color: var(--card-bg);
            border: 1px solid rgba(255, 102, 0, 0.4);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 0 25px rgba(255, 102, 0, 0.2);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s ease, border-color 0.3s ease;
        }

        /* Hover-Effekt: Groß-Ploppen */
        .card:hover {
            transform: translateY(-5px) scale(1.03);
            border-color: var(--accent-color);
            box-shadow: 0 0 40px rgba(255, 102, 0, 0.55);
            cursor: pointer;
        }

        /* Login Overlay */
        #login-overlay {
            position: fixed;
            inset: 0;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .login-card {
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        .login-card:hover {
            transform: none;
            cursor: default;
        }

        .login-card h2 {
            color: var(--accent-color);
            margin-bottom: 8px;
        }

        .login-card p {
            color: var(--text-muted);
            margin-bottom: 24px;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px 16px;
            background: #121212;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
            box-sizing: border-box;
            margin-bottom: 16px;
            text-align: center;
        }

        input[type="text"]:focus {
            border-color: var(--accent-color);
            outline: none;
            box-shadow: 0 0 15px rgba(255, 102, 0, 0.7);
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: var(--accent-color);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #e05500;
        }

        .hidden {
            display: none !important;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .header h1 {
            margin: 0;
            font-size: 24px;
        }

        #user-display {
            color: var(--accent-color);
            font-weight: bold;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .stat-card h3 {
            margin: 0 0 8px 0;
            font-size: 14px;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .stat-card .value {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 4px;
        }

        .currency {
            font-size: 14px;
            color: var(--text-muted);
            font-weight: normal;
        }

        /* Progress Bar */
        .progress-container {
            background: #121212;
            border-radius: 8px;
            height: 8px;
            width: 100%;
            overflow: hidden;
            margin-top: 8px;
        }

        .progress-bar {
            background: var(--accent-color);
            height: 100%;
            width: 0%;
            transition: width 0.5s ease;
            box-shadow: 0 0 8px var(--accent-color);
        }

        .milestone-info {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 6px;
        }

        /* Hardware Breakdown */
        #hardware-breakdown {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 12px;
        }

        .hardware-item {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            padding: 6px 0;
            border-bottom: 1px solid #111;
        }

        /* Chart & Trend */
        .chart-container {
            height: 300px;
            position: relative;
            margin-top: 16px;
        }

        #trend-indicator {
            font-size: 14px;
            font-weight: bold;
            margin-top: 8px;
        }

        .trend-neutral { color: var(--accent-color); }
        .trend-up { color: #00ff00; }
        .trend-down { color: #ff0000; }

        /* Achievement Popup */
        #achievement-popup {
            position: fixed;
            bottom: -100px;
            left: 50%;
            transform: translateX(-50%);
            background: #111;
            border: 2px solid var(--accent-color);
            padding: 16px 24px;
            border-radius: 12px;
            z-index: 2000;
            transition: bottom 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 30px rgba(255,102,0,0.4);
            pointer-events: none;
        }

        #achievement-popup.show {
            bottom: 30px;
        }

        .chat-info {
            color: var(--text-muted);
            font-size: 14px;
            margin: -10px 0 15px 0;
        }

        .comment-section h3 {
            margin-top: 0;
        }

        .comment-section:hover {
            transform: none;
            cursor: default;
        }

        /* Card expansion overlay */
        #card-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 500;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        #card-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .card-description {
            display: none;
        }

        #card-modal .card-description {
            display: block;
            font-size: 13px;
            color: #aaa;
            margin-top: 10px;
            line-height: 1.6;
        }

            0% { border-color: #ff0000; box-shadow: 0 0 25px rgba(255, 0, 0, 0.6); }
            33% { border-color: #00ff00; box-shadow: 0 0 25px rgba(0, 255, 0, 0.6); }
