<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DUCO Login</title>

<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen" class="login-bg">

    <div class="login-box">
        <h1>🪙 DUCO LOGIN</h1>

        <input id="username" placeholder="Duino-Coin Username">

        <button onclick="login()">Bestätigen</button>
    </div>

</div>

<!-- DASHBOARD -->
<div id="app" class="hidden">

    <div class="topbar">
        <h2>DUCO Dashboard</h2>
    </div>

    <div class="grid">

        <div class="card">💰 <div id="balance">-</div></div>
        <div class="card">📈 <div id="price">-</div></div>
        <div class="card">⚡ <div id="hashrate">-</div></div>
        <div class="card">⛏️ <div id="miners">-</div></div>

    </div>

    <canvas id="chart"></canvas>

</div>

<script src="script.js"></script>
</body>
</html>
